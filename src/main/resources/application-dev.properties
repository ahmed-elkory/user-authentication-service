#Application-dev.properties

# ==========================================
# DEVELOPMENT ENVIRONMENT CONFIGURATION
# ==========================================

# This configuration is used for local development.

# Includes:
# - Local MySQL database
# - Debug-friendly settings
# - SMTP testing configuration (MailDev or Gmail)
# - JPA SQL logging enabled

# ⚠️ WARNING:
# Never use these settings in production.
# Credentials and debug options are not secure.

# ===============================
# DATABASE (MySQL - Workbench)
# ===============================

# NOTE: Update credentials based on your local MySQL setup

spring.datasource.url=jdbc:mysql://localhost:3306/auth_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.url=jdbc:mysql://mysql:3306/auth_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ===============================
# MAIL (MailDev for testing)
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*


spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000