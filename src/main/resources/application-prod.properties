#application-prod.properties

# ==========================================
# PRODUCTION ENVIRONMENT CONFIGURATION
# ==========================================

# This configuration is used in production deployment.

# Includes:
# - Secure database connection (external server)
# - Optimized JPA settings (no schema auto-update)
# - Real SMTP configuration
# - No debugging/log verbosity

# ⚠️ SECURITY NOTICE:
# All sensitive values must be injected via environment variables
# (e.g. ${DB_USERNAME}, ${JWT_SECRET})
#
# Never hardcode secrets in this file.


# DATABASE (example - replace with real server DB)
spring.datasource.url=jdbc:mysql://prod-db-host:3306/auth_service
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=true

# MAIL (real SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000