# ==========================================
# TEST DATABASE (H2 IN-MEMORY)
# ==========================================

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Optional: show SQL during tests
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# ==========================================
# JWT
# ==========================================

jwt.secret=testsecretkeytestsecretkey123456
jwt.expiration=3600000

# ==========================================
# APPLICATION
# ==========================================

app.token.expiration=15
app.lock.duration=15
app.base-url=http://localhost:8080

api.prefix=/api/v1

# ==========================================
# MAIL (FAKE TEST VALUES)
# ==========================================

# disabled by convention (not used because of @MockBean)
spring.mail.host=disabled
spring.mail.port=0
spring.mail.username=test@test.com
spring.mail.password=test

# ==========================================
# ADMIN TEST
# ==========================================
ADMIN_EMAIL=admin@test.com
ADMIN_PASSWORD=admin123